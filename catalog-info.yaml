apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: api-cep
  description: API para consulta de CEP
  tags:
    - api
    - rest
    - python
    - fastapi
    - docker
    - backend
    - experimental

annotations:
  github.com/project-slug: ShlomoChanoch/api-cep

links:
  - url: https://github.com/ShlomoChanoch/api-cep
    title: Repositório (GitHub)
  - url: http://localhost:8000/docs
    title: Documentação da API (Swagger UI)
  - url: http://localhost:8000/api-docs
    title: API Docs (Backstage)

specs:
  type: service
  lifecycle: experimental
  owner: user:default/guest
  providesApis:
    - api-cep
