apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: api-cep
  description: API para consulta de CEP
  tags:
    - api
    - rest
    - python
    - fastapi
    - docker
    - backend
    - experimental
  annotations:
    github.com/project-slug: ShlomoChanoch/api-cep
  links:
    - url: https://github.com/ShlomoChanoch/api-cep
      icon: docs
      title: Repositório (GitHub)
    - url: http://localhost:8000/docs
      icon: docs
      title: Documentação da API (Swagger UI)
    - url: http://localhost:8000/api-docs
      icon: docs
      title: API Docs (Backstage)
    - url: https://viacep.com.br
      icon: web
      title: external-dependency
spec:
  type: service
  lifecycle: experimental
  owner: group:default/team-cep
  providesApis:
    - api-cep
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: viacep-api
  description: API externa ViaCEP para consulta de CEPs brasileiros
  tags:
    - external
    - api
    - third-party
  links:
    - url: https://viacep.com.br
      icon: web
      title: ViaCEP Website
    - url: https://viacep.com.br/ws/01310100/json/
      title: Exemplo de Consulta
      icon: docs
spec:
  type: external-api
  owner: group:default/team-cep
  dependencyOf:
    - component:default/api-cep
